name: CI Pipeline

on:
  push:
    branches:
      - main  #[main, develop] Trigger the workflow on pushes to the main and develop branches
  pull_request:
    branches:
      - main
jobs:
  build-test-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build